<!DOCTYPE html>
<html lang="en" data-theme="vscode">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CS197 Reader</title>
<link rel="stylesheet" href="styles.css">
<script>(function(){try{var d=document.documentElement,t=localStorage.getItem('cs197-theme'),f=localStorage.getItem('cs197-font'),z=localStorage.getItem('cs197-size');if(t)d.setAttribute('data-theme',t);d.setAttribute('data-font',f||'sans');if(z)d.style.setProperty('--size-scale',z);}catch(e){}})();</script>
</head>
<body>
<a class="skip" href="#doc">Skip to content</a>
<div id="progress" aria-hidden="true"></div>

<nav class="topbar" aria-label="Primary">
  <div class="row">
    <a class="home" href="index.html">Research Paper Reader</a>
    <span class="crumb"></span>
    <div class="right">
      <div class="sizer" role="group" aria-label="Text size">
        <button id="dec" type="button" aria-label="Smaller text">A−</button>
        <button id="inc" type="button" aria-label="Larger text">A+</button>
      </div>
      <select id="font" class="themepick" aria-label="Reading font">
        <option value="sans">Sans</option>
        <option value="serif">Serif</option>
        <option value="georgia">Georgia</option>
        <option value="book">Book</option>
      </select>
      <select id="theme" class="themepick" aria-label="Colour theme">
        <option value="vscode">VS Code Dark</option>
        <option value="onedark">One Dark</option>
        <option value="github">GitHub Dark</option>
        <option value="tokyonight">Tokyo Night</option>
        <option value="paper">Paper (light)</option>
      </select>
    </div>
  </div>
</nav>

<div class="wrap">
  <main id="doc"><p style="color:var(--fg-dim)">Loading…</p></main>
</div>

<button id="resume" type="button" title="Jump to your bookmark">
  <span class="dot" aria-hidden="true">●</span>
  <span class="go txt">Continue where you left off</span>
  <span class="x" role="button" aria-label="Dismiss" title="Dismiss">×</span>
</button>

<div id="lb" role="dialog" aria-modal="true" aria-label="Enlarged image"><img alt=""></div>

<script src="marked.min.js"></script>
<script src="reader.js"></script>
<script>
(function(){
  var d = document.documentElement;
  function wire(id, attr, key, def){
    var sel = document.getElementById(id); if(!sel) return;
    sel.value = d.getAttribute(attr) || def;
    sel.addEventListener('change', function(){
      d.setAttribute(attr, sel.value);
      try{ localStorage.setItem(key, sel.value); }catch(e){}
    });
  }
  wire('theme','data-theme','cs197-theme','vscode');
  wire('font','data-font','cs197-font','sans');
  // text size
  var scale = parseFloat((function(){try{return localStorage.getItem('cs197-size');}catch(e){}})()) || 1;
  function setScale(v){ scale = Math.min(1.4, Math.max(0.85, Math.round(v*100)/100));
    d.style.setProperty('--size-scale', scale); try{ localStorage.setItem('cs197-size', scale); }catch(e){} }
  setScale(scale);
  var inc=document.getElementById('inc'), dec=document.getElementById('dec');
  if(inc) inc.addEventListener('click', function(){ setScale(scale+0.06); });
  if(dec) dec.addEventListener('click', function(){ setScale(scale-0.06); });
})();
</script>
</body>
</html>
